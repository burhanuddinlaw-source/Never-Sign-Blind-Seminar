<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,follow">
<title>Burhanuddin Law — Strategy Session Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --midnight:#06131F;--navy:#0D1B2A;--emerald:#0C5B56;--emerald-d:#0a4d49;--teal:#17A7A0;
    --deep-teal:#3D8F88;--sky:#4B8FDB;--gray:#E6ECF1;--white:#FFFFFF;--text-gray:#5A6675;
    --line:#dbe3ea;--serif:'EB Garamond',Georgia,serif;--sans:'Lato',Calibri,Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--sans);color:var(--navy);background:var(--gray);line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
  h1,h2,h3{font-family:var(--serif);font-weight:700;line-height:1.14;letter-spacing:-.01em;color:var(--navy)}

  /* shell */
  .topbar{background:#fff;border-bottom:1px solid var(--line)}
  .topbar .in{max-width:760px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;padding:0 22px}
  .brand{display:flex;align-items:center;gap:11px}
  .brand img{height:38px}
  .brand .nm{font-family:var(--serif);font-size:19px;font-weight:600}
  .topbar .ph{font-size:13px;font-weight:700;color:var(--emerald);text-decoration:none;letter-spacing:.02em}
  @media(max-width:520px){.topbar .ph{display:none}}

  .stage{max-width:680px;margin:0 auto;padding:30px 22px 70px}

  /* progress */
  .prog-wrap{margin-bottom:26px}
  .prog-meta{display:flex;justify-content:space-between;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-bottom:9px}
  .prog{height:6px;background:#cfdae3;border-radius:4px;overflow:hidden}
  .prog .fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--emerald));border-radius:4px;width:0;transition:width .45s cubic-bezier(.3,.7,.2,1)}

  /* card / screen */
  .screen{background:#fff;border:1px solid var(--line);border-radius:18px;padding:40px 38px;box-shadow:0 20px 50px rgba(6,19,31,.10);animation:in .42s cubic-bezier(.2,.7,.2,1)}
  @keyframes in{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  @media(max-width:560px){.screen{padding:30px 22px;border-radius:14px}}
  .eyebrow{font-weight:700;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--teal);margin-bottom:14px;display:block}
  .screen h1{font-size:clamp(26px,5vw,36px);max-width:18ch}
  .screen .q{font-size:clamp(22px,4.4vw,30px);font-family:var(--serif);font-weight:700;line-height:1.18}
  .screen .sub{color:var(--text-gray);font-size:16px;margin-top:12px;max-width:46ch}

  /* option cards */
  .opts{display:grid;gap:13px;margin-top:28px}
  .opt{display:flex;align-items:center;gap:15px;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:12px;
    padding:18px 20px;font-family:var(--sans);font-size:16px;font-weight:700;color:var(--navy);cursor:pointer;transition:all .16s ease}
  .opt:hover{border-color:var(--emerald);background:#f5faf9;transform:translateX(3px)}
  .opt .dot{width:22px;height:22px;border-radius:50%;border:2px solid #c4cfd9;flex:none;transition:all .16s}
  .opt:hover .dot{border-color:var(--emerald)}
  .opt.sel{border-color:var(--emerald);background:#eef7f5}
  .opt.sel .dot{border-color:var(--emerald);background:var(--emerald);box-shadow:inset 0 0 0 4px #fff}
  .opt .lab small{display:block;font-weight:400;font-size:13px;color:var(--text-gray);margin-top:2px}

  /* fork (two big paths) */
  .fork{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:28px}
  @media(max-width:560px){.fork{grid-template-columns:1fr}}
  .path{border:1.5px solid var(--line);border-radius:14px;padding:26px 22px;cursor:pointer;transition:all .18s ease;background:#fff;text-align:left}
  .path:hover{border-color:var(--emerald);box-shadow:0 14px 34px rgba(6,19,31,.10);transform:translateY(-3px)}
  .path .ic{width:44px;height:44px;border-radius:10px;background:var(--gray);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
  .path h3{font-size:21px;margin-bottom:7px}
  .path p{font-size:14px;color:var(--text-gray);line-height:1.45}
  .path .go{margin-top:16px;font-size:13px;font-weight:700;color:var(--emerald);letter-spacing:.03em}

  /* nav row */
  .navrow{display:flex;align-items:center;justify-content:space-between;margin-top:28px}
  .back{background:none;border:none;color:var(--text-gray);font-family:var(--sans);font-weight:700;font-size:14px;cursor:pointer;padding:8px 4px}
  .back:hover{color:var(--navy)}
  .back:disabled{opacity:0;pointer-events:none}
  .hint{font-size:12.5px;color:var(--text-gray)}

  /* form */
  .field{margin-top:18px}
  .field label{display:block;font-size:13px;font-weight:700;letter-spacing:.02em;margin-bottom:7px;color:var(--navy)}
  .field input,.field textarea{width:100%;font-family:var(--sans);font-size:16px;color:var(--navy);background:#fff;
    border:1.5px solid var(--line);border-radius:10px;padding:13px 15px;transition:border .15s}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--emerald)}
  .field textarea{resize:vertical;min-height:84px}
  .err{color:#b3261e;font-size:12.5px;margin-top:6px;display:none}
  .field.bad input{border-color:#b3261e}.field.bad .err{display:block}
  .consent{font-size:12px;color:var(--text-gray);margin-top:16px;line-height:1.45}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;font-family:var(--sans);font-weight:700;font-size:16px;letter-spacing:.03em;
    background:var(--emerald);color:#fff;border:none;border-radius:10px;padding:16px 24px;cursor:pointer;transition:all .16s;margin-top:26px}
  .btn:hover{background:var(--emerald-d);transform:translateY(-2px);box-shadow:0 12px 28px rgba(12,91,86,.32)}
  .btn .arr{transition:transform .16s}.btn:hover .arr{transform:translateX(4px)}
  .btn.lite{background:#fff;color:var(--emerald);border:1.5px solid var(--emerald)}
  .btn.lite:hover{background:#f0f8f6;box-shadow:none}

  /* result */
  .result .badge{display:inline-flex;align-items:center;gap:8px;background:#eef7f5;color:var(--emerald);font-weight:700;font-size:12px;
    letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:30px;margin-bottom:18px}
  .result .badge.soft{background:#eef3f8;color:#2f6fb0}
  .summary{background:var(--gray);border-radius:12px;padding:18px 20px;margin-top:22px}
  .summary .row{display:flex;justify-content:space-between;font-size:14px;padding:7px 0;border-bottom:1px solid #d3dde6}
  .summary .row:last-child{border-bottom:none}
  .summary .row span:first-child{color:var(--text-gray)}
  .summary .row span:last-child{font-weight:700;text-align:right;max-width:60%}
  .whatnext{margin-top:22px}
  .whatnext li{list-style:none;position:relative;padding-left:28px;margin-bottom:11px;font-size:15px}
  .whatnext li::before{content:"";position:absolute;left:0;top:6px;width:12px;height:12px;border-radius:50%;background:var(--emerald);box-shadow:0 0 0 4px rgba(12,91,86,.12)}
  .urgent{background:#fff4ec;border-left:3px solid #d9822b;border-radius:8px;padding:13px 16px;font-size:14px;color:#8a4f17;margin-top:20px}
  .confirm{display:flex;align-items:center;gap:7px;font-size:13.5px;font-weight:700;color:var(--emerald);background:#eef7f5;border-radius:8px;padding:11px 14px;margin-top:16px}
  .confirm svg{flex:none}
  .restart{text-align:center;margin-top:22px}
  .restart button{background:none;border:none;color:var(--text-gray);font-family:var(--sans);font-size:13px;text-decoration:underline;cursor:pointer}
  .foot{text-align:center;color:var(--text-gray);font-size:12px;margin-top:30px;line-height:1.5}
</style>
</head>

<script>
/* ---------- FUNNEL CONFIG ---------- */
const FLOWS = {
  litigation: {
    name: "Defend Your Legacy",
    questions: [
      { id:"status", q:"Where do things stand right now?", sub:"This tells us how urgently we need to move.",
        options:[
          {v:"served", l:"I've been served with a lawsuit", s:3, urgent:true},
          {v:"threatened", l:"I've been threatened with legal action", s:3},
          {v:"plaintiff", l:"I need to take action against someone", s:3},
          {v:"research", l:"I'm just researching for now", s:0}
        ]},
      { id:"type", q:"What's the dispute about?", sub:"Pick the closest fit.",
        options:[
          {v:"contract", l:"A contract or business deal", s:2},
          {v:"partner", l:"A partner or co-owner dispute", s:2},
          {v:"vendor", l:"A vendor or supplier", s:2},
          {v:"employment", l:"A current or former employee", s:2},
          {v:"other", l:"Something else", s:1}
        ]},
      { id:"stakes", q:"Roughly how much is at stake?", sub:"A ballpark is fine — it helps us scope the response.",
        options:[
          {v:"u50", l:"Under $50,000", s:1},
          {v:"50-250", l:"$50,000 – $250,000", s:2},
          {v:"250-1m", l:"$250,000 – $1 million", s:3},
          {v:"1m+", l:"Over $1 million", s:3},
          {v:"unsure", l:"Not sure yet", s:2}
        ]},
      { id:"family", q:"Is this a family-owned or closely-held business?", sub:"We work almost exclusively with owners who built it themselves.",
        options:[ {v:"yes", l:"Yes", s:2}, {v:"no", l:"No", s:1} ]},
      { id:"deadline", q:"Is there a deadline to respond?", sub:"Court deadlines move fast — missing one can cost you the case.",
        options:[
          {v:"days", l:"Yes — within the next few days", s:3, urgent:true},
          {v:"weeks", l:"Within a few weeks", s:2},
          {v:"none", l:"No deadline yet", s:1},
          {v:"unsure", l:"I'm not sure", s:2}
        ]}
    ]
  },
  growth: {
    name: "Never Sign Blind",
    questions: [
      { id:"revenue", q:"What's your business's annual revenue?", sub:"This session is built for growing companies.",
        options:[
          {v:"u2", l:"Under $2 million", s:1},
          {v:"2-5", l:"$2 – $5 million", s:3},
          {v:"5-20", l:"$5 – $20 million", s:3},
          {v:"20+", l:"Over $20 million", s:2}
        ]},
      { id:"counsel", q:"How do you handle legal right now?", sub:"Be honest — there's no wrong answer.",
        options:[
          {v:"diy", l:"No lawyer — I handle it myself", s:3},
          {v:"hourly", l:"I call an outside firm hourly when needed", s:3},
          {v:"unhappy", l:"I have a lawyer but I'm not happy", s:3},
          {v:"inhouse", l:"I already have in-house counsel", s:1}
        ]},
      { id:"trigger", q:"What's prompting this now?", sub:"What made today the day you looked into this?",
        options:[
          {v:"contracts", l:"Contracts piling up", s:2},
          {v:"deal", l:"A specific deal or negotiation", s:3},
          {v:"hiring", l:"Hiring and HR questions", s:2},
          {v:"dispute", l:"A vendor or partner dispute", s:2},
          {v:"protect", l:"I just want ongoing protection", s:2}
        ]},
      { id:"volume", q:"How often do legal questions come up?", sub:"Roughly.",
        options:[
          {v:"weekly", l:"Constantly — most weeks", s:3},
          {v:"monthly", l:"A few times a month", s:3},
          {v:"sometimes", l:"Occasionally", s:2},
          {v:"rarely", l:"Rarely", s:1}
        ]},
      { id:"family", q:"Is your business family-owned or closely-held?", sub:"It's who we serve best.",
        options:[ {v:"yes", l:"Yes", s:2}, {v:"no", l:"No", s:1} ]}
    ]
  }
};

const LABELS = { /* human-readable answer values for the summary */ };
Object.values(FLOWS).forEach(f=>f.questions.forEach(qq=>qq.options.forEach(o=>LABELS[o.v]=o.l)));

/* ---------- STATE ---------- */
let state = { path:null, idx:0, answers:{}, score:0, urgent:false };
const app = document.getElementById('app');
const progWrap = document.getElementById('progWrap');

function setProgress(){
  if(!state.path){ progWrap.style.display='none'; return; }
  const total = FLOWS[state.path].questions.length + 1; // questions + contact
  const current = Math.min(state.idx+1, total);
  const pct = Math.round((state.idx/(total))*100);
  progWrap.style.display='block';
  document.getElementById('progLabel').textContent = `Step ${current} of ${total}`;
  document.getElementById('progPct').textContent = pct+'%';
  document.getElementById('progFill').style.width = pct+'%';
}

/* ---------- RENDERERS ---------- */
function renderFork(){
  state.path=null; setProgress();
  app.innerHTML = `
    <div class="screen">
      <span class="eyebrow">Find your strategy session · 60 seconds</span>
      <h1>Which sounds most like you right now?</h1>
      <p class="sub">Answer a few quick questions and we'll match you to the right session — and tell you straight if we're not the firm for it.</p>
      <div class="fork">
        <button class="path" data-path="litigation">
          <div class="ic">${ICON_shield}</div>
          <h3>My business is facing a lawsuit</h3>
          <p>You've been sued, threatened, or need to take action — and you need to know where you stand.</p>
          <div class="go">Start &rarr;</div>
        </button>
        <button class="path" data-path="growth">
          <div class="ic">${ICON_grow}</div>
          <h3>I'm growing and need a lawyer in my corner</h3>
          <p>You're scaling and tired of signing things blind or paying by the question.</p>
          <div class="go">Start &rarr;</div>
        </button>
      </div>
    </div>`;
  app.querySelectorAll('.path').forEach(b=>b.onclick=()=>{ state.path=b.dataset.path; state.idx=0; state.answers={}; state.score=0; state.urgent=false; renderStep(); });
}

function renderStep(){
  const flow = FLOWS[state.path];
  if(state.idx < flow.questions.length){ renderQuestion(flow.questions[state.idx]); }
  else { renderContact(); }
}

function renderQuestion(qq){
  setProgress();
  const chosen = state.answers[qq.id];
  app.innerHTML = `
    <div class="screen">
      <span class="eyebrow">${FLOWS[state.path].name}</span>
      <div class="q">${qq.q}</div>
      ${qq.sub?`<p class="sub">${qq.sub}</p>`:''}
      <div class="opts">
        ${qq.options.map(o=>`<button class="opt ${chosen===o.v?'sel':''}" data-v="${o.v}">
          <span class="dot"></span><span class="lab">${o.l}</span></button>`).join('')}
      </div>
      <div class="navrow">
        <button class="back" ${state.idx===0?'':''}>&larr; Back</button>
        <span class="hint">Tap an answer to continue</span>
      </div>
    </div>`;
  app.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
    const opt = qq.options.find(o=>o.v===b.dataset.v);
    state.answers[qq.id]=opt.v;
    state.answers['_score_'+qq.id]=opt.s;
    if(opt.urgent) state.urgent=true;
    b.classList.add('sel');
    setTimeout(()=>{ state.idx++; renderStep(); }, 230);
  });
  app.querySelector('.back').onclick=()=>{ if(state.idx===0){ renderFork(); } else { state.idx--; renderStep(); } };
}

function renderContact(){
  setProgress();
  app.innerHTML = `
    <div class="screen">
      <span class="eyebrow">${FLOWS[state.path].name} · Last step</span>
      <div class="q">Where should we send your strategy session details?</div>
      <p class="sub">We'll review your answers and reach out within one business day. No spam, ever.</p>
      <div class="field" id="f-name"><label>Full name</label><input id="i-name" type="text" placeholder="Jane Smith"><div class="err">Please enter your name.</div></div>
      <div class="field" id="f-email"><label>Email</label><input id="i-email" type="email" placeholder="jane@company.com"><div class="err">Please enter a valid email.</div></div>
      <div class="field" id="f-phone"><label>Phone</label><input id="i-phone" type="tel" placeholder="(312) 555-0123"><div class="err">Please enter a phone number.</div></div>
      <div class="field"><label>Anything you'd like us to know? <span style="font-weight:400;color:var(--text-gray)">(optional)</span></label>
        <textarea id="i-note" placeholder="A sentence or two about your situation."></textarea></div>
      <button class="btn" id="submit">See my recommended next step <span class="arr">&rarr;</span></button>
      <p class="consent">By submitting, you agree to be contacted about your inquiry. Submitting this form does not create an attorney–client relationship.</p>
      <div class="navrow"><button class="back">&larr; Back</button><span class="hint"></span></div>
    </div>`;
  app.querySelector('.back').onclick=()=>{ state.idx--; renderStep(); };
  app.querySelector('#submit').onclick=()=>{
    const name=val('i-name'), email=val('i-email'), phone=val('i-phone');
    let ok=true;
    toggleBad('f-name', !name); if(!name) ok=false;
    const emailOk=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); toggleBad('f-email', !emailOk); if(!emailOk) ok=false;
    toggleBad('f-phone', !phone || phone.replace(/\D/g,'').length<7); if(!phone||phone.replace(/\D/g,'').length<7) ok=false;
    if(!ok) return;
    state.contact={name,email,phone,note:val('i-note')};
    sendLead();                       // fire the lead to /api/lead (non-blocking)
    state.idx++; setProgress(); renderResult();
  };
}

function computeScore(){
  let s=0; Object.keys(state.answers).forEach(k=>{ if(k.startsWith('_score_')) s+=state.answers[k]; });
  return s;
}

function tier(){
  const s=computeScore();
  if(state.path==='litigation'){
    if(state.answers.status==='research' && s<7) return 'resource';
    if(s>=11) return 'strong';
    if(s>=7) return 'fit';
    return 'soft';
  } else {
    if(state.answers.revenue==='u2') return 'below';
    if(s>=11) return 'strong';
    if(s>=8) return 'fit';
    return 'soft';
  }
}

/* ---------- LEAD CAPTURE ---------- */
const LEAD_ENDPOINT = "/api/lead";   // Vercel serverless function (same origin = no CORS)
function buildPayload(){
  const flow = FLOWS[state.path];
  const answers = {};
  flow.questions.forEach(qq => answers[qq.q] = LABELS[state.answers[qq.id]] || "");
  return {
    submittedAt: new Date().toISOString(),
    path: flow.name,
    track: state.path,
    tier: tier(),
    score: computeScore(),
    urgent: state.urgent,
    name: state.contact.name,
    email: state.contact.email,
    phone: state.contact.phone,
    note: state.contact.note || "",
    answers,
    source: location.hostname
  };
}
function sendLead(){
  try{
    fetch(LEAD_ENDPOINT, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(buildPayload()),
      keepalive:true                 // lets it complete even as the page advances
    }).catch(()=>{});                 // never block the user on a network hiccup
  }catch(e){ /* fail silently — UX must not break */ }
}

function renderResult(){
  progWrap.style.display='none';
  const flow=FLOWS[state.path], t=tier(), first=(state.contact.name||'').split(' ')[0]||'there';
  let badge,badgeClass='',headline,body,cta,ctaText,secondary='';

  if(t==='strong'||t==='fit'){
    badge = t==='strong' ? 'Strong match' : 'You\'re a fit';
    headline = `${first}, the ${flow.name} session is built for you.`;
    body = state.path==='litigation'
      ? `Based on your answers, you're exactly the kind of owner we help most. In your session we'll map your real exposure, give you a clear cost-and-timeline picture, and lay out your fastest path forward.`
      : `Based on your answers, this session will pay for itself fast. We'll map where you're exposed, sort which decisions actually need a lawyer, and show you what on-call counsel would cost for a business your size.`;
    ctaText='Book my session now'; cta='calendar';
  } else if(t==='soft'){
    badge='Let\'s talk'; headline=`${first}, let's figure out the right move together.`;
    body=`Your situation has a few moving parts. The fastest way forward is a short call so we can point you to the right next step — even if that step isn't a paid session yet.`;
    ctaText='Book a free 15-minute call'; cta='call';
  } else if(t==='resource'){
    badge='Plan ahead'; badgeClass='soft'; headline=`${first}, smart to get ahead of it.`;
    body=`Since you're researching rather than facing an active dispute, a full strategy session may be more than you need today. Start with our free guide on protecting a family business from litigation — and we're one call away the moment things heat up.`;
    ctaText='Send me the free guide'; cta='resource';
  } else { /* below revenue threshold */
    badge='Worth a conversation'; badgeClass='soft'; headline=`${first}, here's an honest take.`;
    body=`The Never Sign Blind session is tuned for businesses past $2M in revenue, so a flat retainer may not be the right fit just yet. A short call is the best use of your time — we'll give you the few protections that matter most at your stage, free of charge.`;
    ctaText='Book a free 15-minute call'; cta='call';
  }

  // build answer summary
  const rows = flow.questions.map(qq=>`<div class="row"><span>${qq.q.replace(/\?$/,'')}</span><span>${LABELS[state.answers[qq.id]]||'—'}</span></div>`).join('');

  app.innerHTML = `
    <div class="screen result">
      <span class="badge ${badgeClass}">${CHECK} ${badge}</span>
      <h1>${headline}</h1>
      <p class="confirm">${CHECK} Got it — your details are on the way to our team. We'll be in touch within one business day.</p>
      <p class="sub" style="max-width:52ch">${body}</p>
      ${state.urgent && (t==='strong'||t==='fit') ? `<div class="urgent"><strong>Time-sensitive:</strong> you flagged a deadline. We prioritize active-deadline matters — call (312) 216-5174 now and reference this form.</div>`:''}
      <ul class="whatnext">
        <li>We review your answers before you ever speak to us — so the session starts with substance, not intake.</li>
        <li>You'll get a real action plan, whether or not you hire us.</li>
        <li>${state.path==='litigation'?'Flat fee, credited toward your matter if you move forward.':'No retainer talk unless you ask for it.'}</li>
      </ul>
      <button class="btn" id="cta">${ctaText} <span class="arr">&rarr;</span></button>
      ${cta!=='call'?'<button class="btn lite" id="cta2">Or book a free 15-minute call instead</button>':''}
      <div class="summary">
        <div class="row"><span>Your path</span><span>${flow.name}</span></div>
        ${rows}
      </div>
      <div class="restart"><button id="restart">Start over</button></div>
    </div>`;
  // CTA wiring — replace '#' with real Calendly / booking URLs
  const links={calendar:'https://burhanuddinlaw.com/book-consultation/', call:'https://burhanuddinlaw.com/book-consultation/', resource:'https://burhanuddinlaw.com/book-consultation/'};
  app.querySelector('#cta').onclick=()=>{ window.location.href=links[cta]; };
  const c2=app.querySelector('#cta2'); if(c2) c2.onclick=()=>{ window.location.href=links.call; };
  app.querySelector('#restart').onclick=()=>{ state={path:null,idx:0,answers:{},score:0,urgent:false}; renderFork(); };
}

/* helpers */
function val(id){return (document.getElementById(id).value||'').trim();}
function toggleBad(id,bad){document.getElementById(id).classList.toggle('bad',bad);}

/* icons */
const ICON_shield='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0C5B56" stroke-width="1.8"><path d="M12 3l7 3v5c0 5-3.5 8-7 9-3.5-1-7-4-7-9V6l7-3z"/></svg>';
const ICON_grow='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0C5B56" stroke-width="1.8"><path d="M4 18l5-5 3 3 7-7M21 9V3h-6"/></svg>';
const CHECK='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12l4 4 10-11"/></svg>';

renderFork();
</script>
</body>
